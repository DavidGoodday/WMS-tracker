<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Project Tracker</title>
<!--
  ┌──────────────────────────────────────────────────────────────────────┐
  │  WMS PROJECT TRACKER — single-file, no build step, safe to edit.       │
  │  All data lives in the PROJECTS and PTO_RAW arrays in the <script>      │
  │  block at the bottom. Edit those to update the dashboard. Colors and    │
  │  type live in the :root variables below. Nothing here is compiled or    │
  │  minified — change anything and just reload the file.                   │
  └──────────────────────────────────────────────────────────────────────┘
-->


<style>
  :root {
    /* GoodDay / Polaris tokens */
    --font-sans: 'Inter', -apple-system, system-ui, 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace;
    --bg: #F1F2F4;
    --surface: #FFFFFF;
    --surface-2: #F9FAFB;
    --border: #E3E3E3;
    --row-border: #F1F2F4;
    --ink: #1F2124;
    --text: #303030;
    --text-2: #616161;
    --text-3: #8A8A8A;
    --brand: #33CC99;
    --brand-700: #0B8F75;
    --critical: #C5280C;
    --caution: #A44C0A;
    --success: #16A679;
    /* go-live calendar blocks: black / dark grey so they stand out from PTO colors */
    --gl-progress: #1F2124;
    --gl-planned:  #303030;
    --gl-backlog:  #6B6F76;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding: 28px 24px 80px;
  }
  .wrap { max-width: 1240px; margin: 0 auto; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  /* Header */
  header.page { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .mark { width: 36px; height: 36px; border-radius: 8px; box-shadow: 0 0 0 1px rgba(0,0,0,0.06); flex-shrink: 0; }
  .title { font-size: 20px; line-height: 24px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
  .subtitle { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.4px; color: var(--text-2); margin-top: 2px; }
  .synced {
    display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
    background: var(--surface); padding: 7px 12px; border-radius: 8px; box-shadow: inset 0 0 0 1px var(--border);
  }
  .synced .live { width: 7px; height: 7px; border-radius: 99px; background: var(--brand); box-shadow: 0 0 0 3px rgba(51,204,153,0.18); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; box-shadow: inset 0 -1px 0 0 var(--border); margin-bottom: 24px; }
  .tab {
    background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    color: var(--text-3); padding: 11px 16px; position: relative; bottom: -1px; box-shadow: none; transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--ink); box-shadow: inset 0 -2px 0 0 var(--brand); }

  .view { display: none; }
  .view.active { display: block; }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border-radius: 12px; box-shadow: inset 0 0 0 1px var(--border); padding: 16px 18px; }
  .kpi .top { display: flex; align-items: baseline; gap: 8px; }
  .kpi .num { font-family: var(--font-mono); font-weight: 600; font-size: 32px; line-height: 36px; color: var(--text); }
  .kpi .delta { font-family: var(--font-mono); font-weight: 600; font-size: 10px; line-height: 14px; text-transform: uppercase; letter-spacing: .5px; }
  .kpi .lbl { font-size: 12px; line-height: 16px; color: var(--text-2); margin-top: 6px; }

  /* Section label */
  .sec-label { display: flex; align-items: center; gap: 8px; margin: 4px 0 12px; }
  .sec-label .cap { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--text-2); }
  .sec-label .rule { flex: 1; height: 1px; background: var(--border); }

  /* Workload */
  .workload { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .w-card { background: var(--surface); border-radius: 12px; box-shadow: inset 0 0 0 1px var(--border); padding: 14px 16px; }
  .w-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar { flex: 0 0 auto; width: 30px; height: 30px; border-radius: 8px; color: #fff; font-family: var(--font-mono); font-weight: 600; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .w-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .w-sub { font-size: 11px; color: var(--text-3); }
  .w-pto { display: inline-flex; align-items: center; gap: 3px; background: #FEF3EC; color: var(--caution); font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 99px; box-shadow: inset 0 0 0 1px #F8D990; }
  .w-bar { display: flex; height: 6px; border-radius: 99px; overflow: hidden; background: #EBECEF; margin-bottom: 10px; }
  .w-foot { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); }
  .w-foot b { font-family: var(--font-mono); font-weight: 600; }

  /* Toolbar */
  .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; background: var(--surface); border-radius: 12px; box-shadow: inset 0 0 0 1px var(--border); padding: 10px 12px; margin-bottom: 18px; }
  .search { position: relative; flex: 1; min-width: 220px; }
  .search span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 13px; }
  .search input { width: 100%; font-family: var(--font-sans); font-size: 13px; color: var(--text); padding: 8px 10px 8px 28px; border-radius: 8px; border: none; box-shadow: inset 0 0 0 1px var(--border); outline: none; }
  .search input:focus { box-shadow: inset 0 0 0 1px var(--brand), 0 0 0 2px rgba(51,204,153,0.25); }
  .chips { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 2px; }
  .chip { background: transparent; color: var(--text-2); font-family: var(--font-sans); font-weight: 500; font-size: 12px; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; }
  .chip.active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .lead-select { font-family: var(--font-sans); font-size: 13px; color: var(--text); padding: 8px 10px; border-radius: 8px; border: none; box-shadow: inset 0 0 0 1px var(--border); background: var(--surface); outline: none; cursor: pointer; }

  /* Section heads (tables) */
  .table-head { display: flex; align-items: center; gap: 8px; margin: 18px 0 10px; }
  .table-head .dot { width: 8px; height: 8px; border-radius: 99px; }
  .table-head .name { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
  .table-head .count { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

  /* Tables */
  .table-wrap { background: var(--surface); border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font: 400 13px/20px var(--font-sans); }
  th { text-align: left; font: 500 12px/16px var(--font-sans); color: var(--text-2); padding: 10px 14px; background: var(--surface-2); box-shadow: inset 0 -1px 0 0 var(--border); white-space: nowrap; }
  th.r, td.r { text-align: right; }
  td { padding: 11px 14px; box-shadow: inset 0 -1px 0 0 var(--row-border); }
  tr:last-child td { box-shadow: none; }
  tr:hover td { background: var(--surface-2); }
  td.client a { font-weight: 600; color: var(--ink); text-decoration: none; }
  td.client a:hover { color: var(--brand-700); text-decoration: underline; }
  td.code { font-family: var(--font-mono); font-size: 12px; color: var(--text-2); }
  td.lead { color: var(--text-2); }
  td.date { font-family: var(--font-mono); font-size: 12px; color: var(--text); }
  .metric { font-family: var(--font-mono); font-weight: 600; font-size: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font: 500 11px/14px var(--font-sans); padding: 2px 8px; border-radius: 6px; }
  .badge .bdot { width: 6px; height: 6px; border-radius: 99px; }
  .pto-chip { margin-left: 6px; font-size: 9px; font-weight: 600; color: var(--caution); background: #FEF3EC; padding: 1px 5px; border-radius: 99px; box-shadow: inset 0 0 0 1px #F8D990; }
  .empty { padding: 22px; text-align: center; color: var(--text-3); font-size: 13px; }
  .note { font-size: 12px; line-height: 1.6; color: var(--text-2); margin-top: 16px; max-width: 880px; }

  /* Calendar */
  .cal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .cal-title { font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
  .cal-nav { display: flex; gap: 8px; align-items: center; }
  .pto-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2); cursor: pointer; user-select: none; margin-right: 4px; }
  .pto-toggle input { accent-color: var(--brand); width: 15px; height: 15px; cursor: pointer; }
  .cal-btn { background: var(--surface); box-shadow: inset 0 0 0 1px var(--border); border: none; border-radius: 8px; cursor: pointer; width: 34px; height: 34px; font-size: 16px; color: var(--text); display: flex; align-items: center; justify-content: center; }
  .cal-btn:hover { box-shadow: inset 0 0 0 1px var(--brand); }
  .cal-today { background: var(--surface); color: var(--text); box-shadow: inset 0 0 0 1px var(--border); border: none; border-radius: 8px; cursor: pointer; padding: 0 14px; height: 34px; font-family: var(--font-sans); font-weight: 500; font-size: 13px; }
  .cal-today:hover { box-shadow: inset 0 0 0 1px var(--brand); }
  .dow-row, .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .dow-row { margin-bottom: 6px; }
  .dow { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); text-align: center; padding: 4px 0; }
  .cell { background: var(--surface); box-shadow: inset 0 0 0 1px var(--border); border-radius: 8px; min-height: 112px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .cell.blank { background: transparent; box-shadow: none; }
  .cell.before { background: var(--surface-2); }
  .cell.today { box-shadow: 0 0 0 2px var(--brand), inset 0 0 0 1px var(--brand); }
  .daynum { font-family: var(--font-mono); font-weight: 600; font-size: 12px; color: var(--text-2); }
  .cell.before .daynum { color: #ABB1BA; }
  .cell.today .daynum { color: var(--brand-700); }
  .golive { color: #fff; border-radius: 6px; padding: 3px 7px; font: 600 10.5px/1.25 var(--font-sans); cursor: default; }
  .golive.conflict { box-shadow: inset 3px 0 0 0 #FFD23D; }
  .golive .gl-sub { display: block; font: 400 9px/1.2 var(--font-mono); opacity: .85; }
  .pto-band { color: #fff; border-left: 3px solid rgba(0,0,0,0.28); border-radius: 5px; padding: 3px 6px; font: 600 10px/1.2 var(--font-sans); }
  .pto-band.cont { font-weight: 400; font-style: italic; opacity: .72; }
  .pto-band .pto-tag { display: block; font-family: var(--font-mono); font-size: 8px; font-weight: 400; opacity: .85; letter-spacing: .3px; }
  .legend { display: flex; gap: 18px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
  .legend-swatch { width: 13px; height: 13px; border-radius: 4px; }

  @media (max-width: 760px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    th:nth-child(2), td.code:nth-child(2), th:nth-child(3), td.code:nth-child(3) { display: none; }
    .cell { min-height: 84px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body>

<div class="wrap">
  <header class="page">
    <div class="brand-row">
      <svg class="mark" width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GoodDay"><rect width="36" height="36" rx="8" fill="#33CC99"/><circle cx="18" cy="18" r="6.5" fill="none" stroke="#fff" stroke-width="2.5"/><path d="M18 18 L18 11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <div>
        <div class="title">WMS project tracker</div>
        <div class="subtitle">WMS / 3PL integration requests</div>
      </div>
    </div>
    <div class="synced"><span class="live"></span> Synced from Linear · Today <span id="today-str"></span></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="overview">Overview</button>
    <button class="tab" data-view="calendar">Go-live calendar</button>
  </div>

  <!-- OVERVIEW -->
  <section class="view active" id="view-overview">
    <div class="kpis" id="kpis"></div>

    <div class="sec-label"><span class="cap">Workload by lead</span><span class="rule"></span></div>
    <div class="workload" id="workload"></div>

    <div class="toolbar">
      <div class="search"><span>⌕</span><input id="search" placeholder="Search client, WMS, 3PL, lead…"></div>
      <div class="chips" id="chips"></div>
      <select class="lead-select" id="lead-select"></select>
    </div>

    <div class="table-head">
      <span class="dot" style="background:var(--critical);"></span>
      <span class="name" style="color:var(--ink);">Overdue — target date has passed</span>
      <span class="count" id="cnt-overdue"></span>
    </div>
    <div class="table-wrap" id="wrap-overdue"></div>

    <div class="table-head" style="margin-top:26px;">
      <span class="dot" style="background:var(--success);"></span>
      <span class="name" style="color:var(--ink);">On the horizon — upcoming go-lives</span>
      <span class="count" id="cnt-upcoming"></span>
    </div>
    <div class="table-wrap" id="wrap-upcoming"></div>

    <div class="table-head" style="margin-top:26px;">
      <span class="dot" style="background:#CACED3;"></span>
      <span class="name" style="color:var(--text-2);">No target date set</span>
      <span class="count" id="cnt-nodate"></span>
    </div>
    <div class="table-wrap" id="wrap-nodate"></div>

    <p class="note" id="overdue-note"></p>
  </section>

  <!-- CALENDAR -->
  <section class="view" id="view-calendar">
    <div class="cal-head">
      <div class="cal-title" id="cal-title">June 2026</div>
      <div class="cal-nav">
        <label class="pto-toggle"><input type="checkbox" id="pto-switch" checked=""> Show team PTO</label>
        <button class="cal-today" id="cal-today">This month</button>
        <button class="cal-btn" id="cal-prev">‹</button>
        <button class="cal-btn" id="cal-next">›</button>
      </div>
    </div>
    <div class="dow-row" id="dow-row"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-swatch" style="background:var(--gl-planned);"></span> Planned</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--gl-progress);"></span> In progress</div>
      <div class="legend-item"><span class="legend-swatch" style="background:var(--gl-backlog);"></span> Backlog</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#fff; box-shadow: inset 0 0 0 2px var(--brand);"></span> Today</div>
      <div class="legend-item" style="padding-left:12px; box-shadow: inset 2px 0 0 0 #ABB1BA;"><span class="legend-swatch" style="background:repeating-linear-gradient(45deg,#8A8A8A,#8A8A8A 3px,#fff 3px,#fff 6px);"></span> Team PTO</div>
    </div>
    <p class="note" id="cal-note"></p>
  </section>
</div>

<script>

   DATA — edit these arrays to update the tracker. Months are 0-indexed
   (0 = January). date: null means no target date set.
   ════════════════════════════════════════════════════════════════════════ */

  { name:"Aaron Levine + Deposco + Scale 3PL", cal:"Aaron Levine", status:"progress", date:new Date(2026, 6, 3), lead:"Seth Horton", url:"https://linear.app/gooddaysoftware/project/aaron-levine-deposco-scale-3pl-726-cbd2462297aa" },

// Each person keeps one stable color. Add people here as needed.
const PTO_COLORS = {
  "Hunter Leeming": "#0B8F75", "Willy Husted": "#007891", "James Hargett": "#BE4B0A",
  "Seth Horton": "#78286E", "River Crawford": "#0C3B2F", "Matt Pham": "#D8650D",
  "Tim Kauer": "#199E85", "Matt Wardell": "#9F4D90", "David Ortiz": "#2AACBB", "Sai Ancha": "#7945E3",
};

// Inclusive start/end. From the GoodDay PTO Google Calendar.
const PTO_RAW = [
  { person:"James Hargett", start:new Date(2026, 6, 1), end:new Date(2026, 6, 2) },
  { person:"Willy Husted", start:new Date(2026, 6, 6), end:new Date(2026, 6, 6) },
  { person:"Tim Kauer", start:new Date(2026, 6, 6), end:new Date(2026, 6, 6) },

/* ════════════════════════════════════════════════════════════════════════
   LOGIC — you normally don't need to touch anything below this line.
   ════════════════════════════════════════════════════════════════════════ */

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const STATUS = {
  backlog:  { label:"Backlog",     bg:"#EBECEF", fg:"#616161", dot:"#8A8A8A", cal:"var(--gl-backlog)"  },
  planned:  { label:"Planned",     bg:"#E8F0FD", fg:"#144995", dot:"#005BD3", cal:"var(--gl-planned)"  },
  progress: { label:"In progress", bg:"#FCF0D4", fg:"#A44C0A", dot:"#D8650D", cal:"var(--gl-progress)" },
};

const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const midnight = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const fmtDate = d => MONTHS[d.getMonth()].slice(0,3) + " " + d.getDate();
const dayDiff = (a,b) => Math.round((midnight(a) - midnight(b)) / 86400000);
const parseName = name => { const p = name.split(" + ").map(s => s.trim()); return { client:p[0], wms:p[1]||"—", tpl:p[2]||"—" }; };
const initials = name => name.split(" ").filter(Boolean).slice(0,2).map(w => w[0]).join("").toUpperCase();

function spanDist(d, s, e){
  d = midnight(d); s = midnight(s); e = midnight(e);
  if (d >= s && d <= e) return 0;
  return d < s ? Math.round((s - d) / 86400000) : Math.round((d - e) / 86400000);
}
function conflictFor(p){
  if (!p.date || p.lead === "—") return null;
  let best = null;
  PTO_RAW.forEach(e => {
    if (e.person !== p.lead) return;
    const dist = spanDist(p.date, e.start, e.end);
    if (dist <= 7 && (best === null || dist < best)) best = dist;
  });
  return best;
}
function badge(status){
  const m = STATUS[status];
  return `<span class="badge" style="background:${m.bg};color:${m.fg};"><span class="bdot" style="background:${m.dot};"></span>${m.label}</span>`;
}

/* ---------- Filter state ---------- */
let fSearch = "", fStatus = "all", fLead = "all";

/* ---------- KPIs ---------- */
function renderKpis(){
  const all = PROJECTS;
  const overdue = all.filter(p => p.date && midnight(p.date) < TODAY);
  const upcoming = all.filter(p => p.date && midnight(p.date) >= TODAY);
  const nodate = all.filter(p => !p.date);
  const dueSoon = upcoming.filter(p => dayDiff(p.date, TODAY) <= 14);
  const conflicts = upcoming.filter(p => conflictFor(p) !== null);
  const defs = [
    { num: overdue.length,  lbl:"Overdue",          color:"var(--critical)", delta: overdue.length ? "needs action" : "", dColor:"var(--critical)" },
    { num: dueSoon.length,  lbl:"Due in ≤14 days",  color:"var(--caution)",  delta:"", dColor:"var(--caution)" },
    { num: upcoming.length, lbl:"Upcoming go-lives", color:"var(--success)",  delta:"", dColor:"var(--success)" },
    { num: nodate.length,   lbl:"Unscheduled",       color:"var(--text-2)",   delta:"", dColor:"var(--text-2)" },
    { num: conflicts.length,lbl:"Near a lead’s PTO", color: conflicts.length ? "var(--caution)" : "var(--ink)", delta:"", dColor:"var(--caution)" },
  ];
  document.getElementById("kpis").innerHTML = defs.map(k => `
    <div class="kpi">
      <div class="top"><div class="num" style="color:${k.color};">${k.num}</div><div class="delta" style="color:${k.dColor};">${k.delta}</div></div>
      <div class="lbl">${k.lbl}</div>
    </div>`).join("");
}

/* ---------- Workload ---------- */
function renderWorkload(){
  const leads = {};
  PROJECTS.forEach(p => { if (p.lead !== "—") (leads[p.lead] = leads[p.lead] || []).push(p); });
  const cards = Object.keys(leads).map(name => {
    const list = leads[name];
    const counts = { backlog:0, planned:0, progress:0 };
    list.forEach(p => counts[p.status]++);
    const overdue = list.filter(p => p.date && midnight(p.date) < TODAY).length;
    const upc = list.filter(p => p.date && midnight(p.date) >= TODAY).sort((a,b) => a.date - b.date);
    const nextStr = upc.length ? fmtDate(upc[0].date) : "—";
    const conf = list.filter(p => p.date && midnight(p.date) >= TODAY && conflictFor(p) !== null).length;
    const total = list.length;
    const color = PTO_COLORS[name] || "#3a5d55";
    const seg = (n,c) => `<div style="width:${(n/total)*100}%;background:${c};"></div>`;
    return { name, total, overdue, nextStr, conf, color, counts,
      html: `
      <div class="w-card">
        <div class="w-head">
          <div class="avatar" style="background:${color};">${initials(name)}</div>
          <div style="flex:1;min-width:0;">
            <div class="w-name">${esc(name)}</div>
            <div class="w-sub">${total} project${total===1?"":"s"}</div>
          </div>
          ${conf ? `<span class="w-pto" title="${conf} go-live(s) within a week of this lead’s PTO">PTO ${conf}</span>` : ""}
        </div>
        <div class="w-bar">${seg(counts.progress,"#D8650D")}${seg(counts.planned,"#2463BC")}${seg(counts.backlog,"#ABB1BA")}</div>
        <div class="w-foot">
          <span>Overdue <b style="color:${overdue?"var(--critical)":"var(--text-3)"};">${overdue}</b></span>
          <span>Next <b style="color:var(--text);">${nextStr}</b></span>
        </div>
      </div>` };
  }).sort((a,b) => b.total - a.total);
  document.getElementById("workload").innerHTML = cards.map(c => c.html).join("");
}

/* ---------- Filter controls ---------- */
function renderChips(){
  const defs = [["all","All"],["progress","In progress"],["planned","Planned"],["backlog","Backlog"]];
  document.getElementById("chips").innerHTML = defs.map(([v,l]) =>
    `<button class="chip ${fStatus===v?"active":""}" data-status="${v}">${l}</button>`).join("");
  document.querySelectorAll("#chips .chip").forEach(b =>
    b.onclick = () => { fStatus = b.dataset.status; renderChips(); renderTables(); });
}
function renderLeadSelect(){
  const leads = [...new Set(PROJECTS.filter(p => p.lead !== "—").map(p => p.lead))].sort();
  const sel = document.getElementById("lead-select");
  sel.innerHTML = `<option value="all">All leads</option>` + leads.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");
  sel.value = fLead;
}

/* ---------- Tables ---------- */
function rowMatches(p){
  if (fStatus !== "all" && p.status !== fStatus) return false;
  if (fLead !== "all" && p.lead !== fLead) return false;
  if (fSearch) { if (!(p.name + " " + p.lead).toLowerCase().includes(fSearch)) return false; }
  return true;
}
function metricCell(p){
  if (!p.date) return "";
  if (midnight(p.date) < TODAY) return `<span class="metric" style="color:var(--critical);">${dayDiff(TODAY,p.date)}d late</span>`;
  const out = dayDiff(p.date, TODAY);
  return `<span class="metric" style="color:${out<=14?"var(--caution)":"var(--text-2)"};">${out}d</span>`;
}
function rowHtml(p, withMetric){
  const n = parseName(p.name);
  const conf = conflictFor(p);
  const isOverdue = p.date && midnight(p.date) < TODAY;
  const ptoChip = (conf !== null && !isOverdue)
    ? `<span class="pto-chip" title="${conf===0 ? esc(p.lead)+" is on PTO during this go-live" : esc(p.lead)+"’s PTO is "+conf+" day(s) from this go-live"}">PTO</span>` : "";
  return `<tr>
    <td class="client"><a href="${p.url}" target="_blank" rel="noopener">${esc(n.client)}</a>${ptoChip}</td>
    <td class="code">${esc(n.wms)}</td>
    <td class="code">${esc(n.tpl)}</td>
    <td>${badge(p.status)}</td>
    <td class="lead">${esc(p.lead)}</td>
    ${withMetric ? `<td class="date">${p.date?fmtDate(p.date):"—"}</td><td class="r">${metricCell(p)}</td>` : ""}
  </tr>`;
}
function tableHtml(rows, withMetric, metricLabel, emptyMsg){
  if (!rows.length) return `<div class="empty">${emptyMsg}</div>`;
  const head = withMetric
    ? `<th>Client</th><th>WMS</th><th>3PL</th><th>Status</th><th>Lead</th><th>Target</th><th class="r">${metricLabel}</th>`
    : `<th>Client</th><th>WMS</th><th>3PL</th><th>Status</th><th>Lead</th>`;
  return `<table><thead><tr>${head}</tr></thead><tbody>${rows.map(p => rowHtml(p, withMetric)).join("")}</tbody></table>`;
}
function renderTables(){
  const f = PROJECTS.filter(rowMatches);
  const overdue = f.filter(p => p.date && midnight(p.date) < TODAY).sort((a,b) => a.date - b.date);
  const upcoming = f.filter(p => p.date && midnight(p.date) >= TODAY).sort((a,b) => a.date - b.date);
  const nodate = f.filter(p => !p.date);
  document.getElementById("wrap-overdue").innerHTML = tableHtml(overdue, true, "Overdue", "Nothing past its target date.");
  document.getElementById("wrap-upcoming").innerHTML = tableHtml(upcoming, true, "Out", "No upcoming go-lives match these filters.");
  document.getElementById("wrap-nodate").innerHTML = tableHtml(nodate, false, "", "No unscheduled projects match these filters.");
  document.getElementById("cnt-overdue").textContent = overdue.length;
  document.getElementById("cnt-upcoming").textContent = upcoming.length;
  document.getElementById("cnt-nodate").textContent = nodate.length;
}

/* ---------- Calendar ---------- */
let calY = TODAY.getFullYear(), calM = TODAY.getMonth(), showPTO = true;

function projectsOn(y,m,d){
  return PROJECTS.filter(p => p.date && p.date.getFullYear()===y && p.date.getMonth()===m && p.date.getDate()===d);
}
function ptoOn(y,m,d){
  const cd = new Date(y,m,d);
  return PTO_RAW.filter(e => cd >= midnight(e.start) && cd <= midnight(e.end)).map(e => ({
    person: e.person,
    cont: cd.getTime() !== midnight(e.start).getTime(),
    color: PTO_COLORS[e.person] || "#54514F",
  })).sort((a,b) => a.person.localeCompare(b.person));
}
function renderCalendar(){
  document.getElementById("cal-title").textContent = MONTHS[calM] + " " + calY;
  document.getElementById("dow-row").innerHTML = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => `<div class="dow">${d}</div>`).join("");
  const grid = document.getElementById("cal-grid");
  const firstDow = new Date(calY, calM, 1).getDay();
  const days = new Date(calY, calM+1, 0).getDate();
  let html = "";
  for (let i=0; i<firstDow; i++) html += `<div class="cell blank"></div>`;
  for (let d=1; d<=days; d++){
    const cd = new Date(calY, calM, d);
    const isToday = cd.getTime() === TODAY.getTime();
    const isBefore = cd < TODAY;
    let cls = "cell"; if (isToday) cls += " today"; else if (isBefore) cls += " before";
    let inner = `<div class="daynum">${d}</div>`;
    projectsOn(calY, calM, d).forEach(p => {
      const conf = conflictFor(p) !== null;
      inner += `<div class="golive${conf?" conflict":""}" style="background:${STATUS[p.status].cal};" title="${esc(p.name)} — ${STATUS[p.status].label} — Lead: ${esc(p.lead)}${conf?" — near lead PTO":""}">${esc(p.cal)}<span class="gl-sub">${STATUS[p.status].label}</span></div>`;
    });
    if (showPTO) ptoOn(calY, calM, d).forEach(e => {
      inner += `<div class="pto-band${e.cont?" cont":""}" style="background:${e.color};" title="${esc(e.person)} — PTO${e.cont?" (cont.)":""}">${esc(e.person.split(" ")[0])}${e.cont?"":'<span class="pto-tag">PTO</span>'}</div>`;
    });
    html += `<div class="${cls}">${inner}</div>`;
  }
  grid.innerHTML = html;
}

/* ---------- Wiring ---------- */
document.getElementById("today-str").textContent = fmtDate(TODAY) + ", " + TODAY.getFullYear();
document.getElementById("overdue-note").innerHTML =
  "“Overdue” means the Linear target-date field is earlier than today (Jun 28, 2026). Some project titles carry a different date than the target-date field — e.g. Aaron Levine’s title says 7/26 but its target date is Jun 10. Sorting and all metrics use the target-date field. Columns are parsed from the Linear project name as Client + WMS + 3PL. A PTO flag marks an upcoming go-live that falls within a week of its lead’s scheduled time off.";
document.getElementById("cal-note").textContent =
  "Calendar reflects the target-date field, which in several cases differs from the date in the project title. Team PTO is a separate toggleable layer (hatched left border) sourced from the GoodDay PTO Google Calendar; each person keeps one stable color, and multi-day spans repeat the name faded on continuation days. A gold left-edge on a go-live means it falls within a week of that lead’s PTO.";

document.getElementById("search").oninput = e => { fSearch = e.target.value.trim().toLowerCase(); renderTables(); };
document.getElementById("lead-select").onchange = e => { fLead = e.target.value; renderTables(); };
document.getElementById("pto-switch").onchange = e => { showPTO = e.target.checked; renderCalendar(); };
document.getElementById("cal-prev").onclick = () => { calM--; if (calM<0){ calM=11; calY--; } renderCalendar(); };
document.getElementById("cal-next").onclick = () => { calM++; if (calM>11){ calM=0; calY++; } renderCalendar(); };
document.getElementById("cal-today").onclick = () => { calY = TODAY.getFullYear(); calM = TODAY.getMonth(); renderCalendar(); };

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".view").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  document.getElementById("view-" + t.dataset.view).classList.add("active");
});

renderKpis();
renderWorkload();
renderChips();
renderLeadSelect();
renderTables();
renderCalendar();
</script>
